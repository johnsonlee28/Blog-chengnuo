<script>
(function(){
  function sendConversion(name, props){
    props = props || {};
    props.page = props.page || location.pathname;
    if (window.va) window.va('event', name, props);
    if (window.gtag) window.gtag('event', name, props);
    if (window.plausible) window.plausible(name, {props: props});
    if (window.umami) window.umami.track(name, props);
    window.dataLayer = window.dataLayer || [];
    window.dataLayer.push({event: name, conversion: props});
  }
  document.addEventListener('click', function(e){
    var el = e.target.closest('[data-conversion-event]');
    if (!el) return;
    sendConversion(el.getAttribute('data-conversion-event'), {
      href: el.getAttribute('href'),
      cta_page: location.pathname,
      cta_text: (el.textContent || '').trim().slice(0,80)
    });
  }, true);
})();
</script>
