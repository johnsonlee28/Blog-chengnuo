baseURL = "https://blog.chengnuo.ai/"
languageCode = "zh-CN"
title = "成诺的复利之旅"
theme = "PaperMod"
[pagination]
  pagerSize = 10
enableRobotsTXT = true
buildDrafts = false

[params]
  author = "成诺"
  description = "AI · 效率 · 独立思考"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  ShowWordCount = false

  [params.homeInfoParams]
    Title = "成诺的复利之旅 🚌"
    Content = "AI · 效率 · 独立思考 | 一个普通人用 AI 折腾的记录"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/johnsonlee28"

[menu]
  [[menu.main]]
    identifier = "home"
    name = "首页"
    url = "/"
    weight = 10
  [[menu.main]]
    identifier = "archives"
    name = "归档"
    url = "/archives/"
    weight = 20
  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 30

[outputs]
  home = ["HTML", "RSS", "JSON"]
