baseURL = "https://blog.zhixingshe.cc/"
languageCode = "zh-CN"
title = "知行社"
theme = "PaperMod"
[pagination]
  pagerSize = 10
enableRobotsTXT = true
buildDrafts = false

[params]
  author = "成诺"
  description = "知行社 — AI · 效率 · 独立思考。一个普通人用 AI 折腾的记录，关注 AI Agent、自动化工作流、独立开发。"
  keywords = ["AI", "AI Agent", "效率", "自动化", "独立开发", "知行社", "成诺", "DeepSeek", "工作流"]
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  ShowWordCount = false
  canonifyURLs = true

  [params.homeInfoParams]
    Title = "知行社 🚌"
    Content = "AI · 效率 · 独立思考 | 一个普通人用 AI 折腾的记录"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/johnsonlee28"
  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

[menu]
  [[menu.main]]
    identifier = "home"
    name = "首页"
    url = "/"
    weight = 10
  [[menu.main]]
    identifier = "archives"
    name = "归档"
    url = "/archives/"
    weight = 20
  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 30

[outputs]
  home = ["HTML", "RSS", "JSON"]
