baseURL = "https://blog.flowhunt.net/"
languageCode = "zh-CN"
defaultContentLanguage = "zh"
title = "FlowHunt｜流程猎人"
theme = "PaperMod"
enableRobotsTXT = true
buildDrafts = false
hasCJKLanguage = true

[pagination]
  pagerSize = 10

[taxonomies]
  tag = "tags"
  category = "categories"

[languages]
  [languages.zh]
    languageName = "中文"
    weight = 1

[params]
  author = "成诺"
  description = "FlowHunt｜流程猎人：记录 AI Agent、自动化工作流、个人生产力系统、市场风险观察和真实产品实验。"
  keywords = ["FlowHunt", "流程猎人", "AI Agent", "AI工作流", "自动化", "个人生产力", "美股风险雷达", "BTC风险温度", "成诺"]
  defaultTheme = "light"
  autoSwitchAppearance = false
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  ShowWordCount = false
  ShowAuthor = true
  DateFormat = "2006年1月2日"

  # 默认OG图（没有cover的文章会用这个）
  [params.cover]
    hidden = false
    hiddenInList = false
    hiddenInSingle = false

  [params.homeInfoParams]
    Title = "👋 FlowHunt｜流程猎人"
    Content = "AI · 效率 · 独立思考 | 记录用 AI 折腾的实践与收获"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/johnsonlee28"
  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"
  [[params.socialIcons]]
    name = "wechat"
    url = "#"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "categories"
    name = "分类"
    url = "/categories/"
    weight = 15
  [[menu.main]]
    identifier = "archives"
    name = "归档"
    url = "/archives/"
    weight = 20
  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 30
  [[menu.main]]
    identifier = "search"
    name = "搜索"
    url = "/search/"
    weight = 40
  [[menu.main]]
    identifier = "rss"
    name = "RSS"
    url = "/index.xml"
    weight = 45
  [[menu.main]]
    identifier = "about"
    name = "关于"
    url = "/about/"
    weight = 50

[outputs]
  home = ["HTML", "RSS", "JSON"]
